<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalles Mensajes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/styles/admin/index.css">
    <link rel="stylesheet" href="/styles/admin/creacionmensajes.css">
    <script src="/js/theme.js" defer></script>
    <script src="/js/admin/detallemensajes.js" defer></script>
</head>

<body>
    <div class="theme-toggle">
        <i class="fa-solid fa-sun"></i>
        <label class="switch">
            <input type="checkbox" id="theme-switch">
            <span class="slider round"></span>
        </label>
        <i class="fa-solid fa-moon"></i>
    </div>

    <div id="toast-container"></div>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-9">
                <div class="card shadow-lg border-0 rounded-3">
                    <div class="card-body">
                        <h3><i class="fa-solid fa-message"></i> Crear detalles del mensaje</h3>
                        <form id="detailsForm">
                            <input type="hidden" id="message_id" value="">

                            <div class="quick-detail-panel mb-4">
                                <label for="quickDetails" class="form-label fw-semibold">Escribe los detalles</label>
                                <textarea id="quickDetails" class="form-control" rows="5"
                                    placeholder="Escribe un detalle por linea.&#10;Ejemplo:&#10;Gracias por estar siempre.&#10;Tu apoyo hizo la diferencia."></textarea>
                                <div class="quick-detail-actions">
                                    <button type="button" id="createQuickDetails" class="btn btn-success">
                                        <i class="fa-solid fa-wand-magic-sparkles"></i> Crear detalles
                                    </button>
                                    <button type="button" id="addDetail" class="btn btn-outline-primary">
                                        <i class="fa-solid fa-plus"></i> Agregar uno vacio
                                    </button>
                                </div>
                            </div>

                            <div class="details-section mb-4">
                                <div class="details-section-header">
                                    <div>
                                        <strong>Detalles creados</strong>
                                        <small id="detailsCounter" class="text-muted d-block">Aun no hay detalles.</small>
                                    </div>
                                </div>

                                <div id="detailsContainer"></div>
                            </div>

                            <button type="submit" id="submitDetails" class="btn btn-primary w-100">Guardar detalles</button>
                            <button type="button" id="updateDetails" class="btn btn-primary w-100 d-none">Actualizar detalles</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
